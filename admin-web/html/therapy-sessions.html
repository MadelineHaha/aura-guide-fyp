<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Therapy Sessions — Aura Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body class="staff-app">
  <header class="staff-nav">
    <a class="staff-nav-brand" href="dashboard.html">
      <img class="logo" src="../assets/images/logo.png" alt="" width="40" height="40" />
      <span class="staff-nav-brand-text">Aura Guide</span>
    </a>
    <div class="staff-nav-links-wrap">
      <button type="button" class="staff-nav-scroll-btn staff-nav-scroll-btn--prev" aria-label="Scroll navigation left">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <nav class="staff-nav-links" aria-label="Main">
        <!-- Dynamically injected by staff-shell.js -->
      </nav>
      <button type="button" class="staff-nav-scroll-btn staff-nav-scroll-btn--next" aria-label="Scroll navigation right">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
    <div class="staff-nav-user">
      <button type="button" class="staff-avatar" id="btn-user-menu" aria-label="Account menu">
        <span class="staff-avatar-initials" id="staff-avatar-initials">—</span>
      </button>
      <div class="staff-user-menu" id="user-menu" hidden>
        <p class="staff-user-menu-name" id="menu-staff-name">—</p>
        <p class="staff-user-menu-role" id="menu-staff-role">—</p>
        <button type="button" class="staff-user-menu-signout" id="btn-sign-out">Sign out</button>
      </div>
    </div>
  </header>

  <main class="staff-page">
    <header class="page-toolbar">
      <div class="page-toolbar-heading">
        <h1 class="page-title">Therapy Sessions</h1>
        <p class="page-subtitle" id="therapy-sessions-count">Loading patients...</p>
      </div>
      <div class="page-toolbar-actions">
        <!-- Add Record Session button hidden by default -->
        <button type="button" class="btn-primary btn-quick-action" id="btn-add-session">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          Record Session
        </button>
      </div>
    </header>

    <div class="patient-accordion-list" id="therapy-sessions-accordion-list">
      <!-- Dynamically populated -->
    </div>
    <p class="table-empty" id="therapy-sessions-empty" hidden>No patients found.</p>

    <div class="modal-backdrop modal-backdrop--stacked" id="add-session-modal" hidden>
      <div
        class="add-health-record-modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="add-session-title"
      >
        <header class="health-records-header">
          <div class="health-records-header-main">
            <span class="health-records-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
              </svg>
            </span>
            <div>
              <h2 class="health-records-title" id="add-session-title">Record Session</h2>
            </div>
          </div>
          <button type="button" class="health-records-close" id="add-session-close" aria-label="Close">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </header>

        <form class="add-health-record-form" id="add-session-form" novalidate>
          <div class="add-health-record-body">
            <label class="form-field form-field--full">
              <span class="form-field-label">Select Patient</span>
              <select class="form-field-input form-field-select" id="add-session-patient-select" required>
                <option value="">Choose a patient...</option>
                <!-- Populated dynamically -->
              </select>
            </label>
            <label class="form-field">
              <span class="form-field-label">Session Name</span>
              <input
                class="form-field-input"
                type="text"
                id="add-session-name"
                placeholder="e.g. Mobility Training"
                required
              />
            </label>
            <label class="form-field">
              <span class="form-field-label">Duration</span>
              <input
                class="form-field-input"
                type="text"
                id="add-session-duration"
                placeholder="e.g. 60 minutes"
                required
              />
            </label>
            <label class="form-field form-field--full">
              <span class="form-field-label">Remarks</span>
              <textarea
                class="form-field-input form-field-textarea"
                id="add-session-remarks"
                rows="2"
                placeholder="e.g. Improved cane technique"
              ></textarea>
            </label>
            <label class="form-field">
              <span class="form-field-label">Status</span>
              <select class="form-field-input form-field-select" id="add-session-status" required>
                <option value="">Select Status</option>
                <option value="Improved">Improved</option>
                <option value="Stable">Stable</option>
                <option value="Requiring Additional Training">Requiring Additional Training</option>
              </select>
            </label>
            <label class="form-field">
              <span class="form-field-label">Session Outcome</span>
              <select class="form-field-input form-field-select" id="add-session-outcome" required>
                <option value="">Select Outcome</option>
                <option value="Excellent">Excellent</option>
                <option value="Good">Good</option>
                <option value="Needs Improvement">Needs Improvement</option>
              </select>
            </label>
            <label class="form-field">
              <span class="form-field-label">Appointment</span>
              <select class="form-field-input form-field-select" id="add-session-appointment-select" required>
                <option value="">Select an appointment...</option>
                <!-- Populated dynamically based on selected patient -->
              </select>
            </label>
          </div>
          <p class="add-patient-error" id="add-session-error" role="alert" hidden></p>
          <footer class="add-health-record-footer">
            <button type="submit" class="btn-primary btn-save-health-record" id="add-session-submit">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
                <polyline points="20 6 9 17 4 12" />
              </svg>
              <span>Save Session</span>
            </button>
          </footer>
        </form>
      </div>
    </div>
  </main>

  <script type="module" src="../js/therapy-sessions-page.js?v=3"></script>
</body>
</html>
