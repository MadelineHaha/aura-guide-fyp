<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Communication — Aura Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body class="staff-app">
  <header class="staff-nav">
    <a class="staff-nav-brand" href="dashboard.html">
      <img class="logo" src="../assets/images/logo.png" alt="" width="40" height="40" />
      <span class="staff-nav-brand-text">Aura Guide</span>
    </a>
    <div class="staff-nav-links-wrap">
      <button type="button" class="staff-nav-scroll-btn staff-nav-scroll-btn--prev" aria-label="Scroll navigation left">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <nav class="staff-nav-links" aria-label="Main">
        <a class="staff-nav-link" href="dashboard.html">Dashboard</a>
        <a class="staff-nav-link" href="appointments.html">Appointments</a>
        <a class="staff-nav-link" href="patients.html">Patients</a>
        <a class="staff-nav-link" href="#">Emergencies</a>
        <a class="staff-nav-link" href="#">Reports</a>
        <a class="staff-nav-link is-active" href="communication.html">Communication</a>
        <a class="staff-nav-link" href="logs.html">Logs</a>
      </nav>
      <button type="button" class="staff-nav-scroll-btn staff-nav-scroll-btn--next" aria-label="Scroll navigation right">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
    <div class="staff-nav-user">
      <button type="button" class="staff-avatar" id="btn-user-menu" aria-label="Account menu">
        <span class="staff-avatar-initials" id="staff-avatar-initials">—</span>
      </button>
      <div class="staff-user-menu" id="user-menu" hidden>
        <p class="staff-user-menu-name" id="menu-staff-name">—</p>
        <p class="staff-user-menu-role" id="menu-staff-role">—</p>
        <button type="button" class="staff-user-menu-signout" id="btn-sign-out">Sign out</button>
      </div>
    </div>
  </header>

  <main class="staff-page communication-page">
    <div class="communication-layout">
      <aside class="communication-sidebar" aria-label="Chat list">
        <div class="communication-sidebar-inner">
          <label class="communication-search">
            <span class="communication-search-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="7" />
                <line x1="16.5" y1="16.5" x2="21" y2="21" />
              </svg>
            </span>
            <input
              type="search"
              class="communication-search-input"
              id="chat-search"
              placeholder="Search chat"
              autocomplete="off"
            />
          </label>
          <div class="communication-filters" role="tablist" aria-label="Filter chats">
            <button type="button" class="communication-filter is-active" data-filter="all">All</button>
            <button type="button" class="communication-filter" data-filter="unread">Unread</button>
          </div>
          <ul class="communication-thread-list" id="chat-thread-list" role="list"></ul>
        </div>
      </aside>

      <section class="communication-panel" aria-label="Conversation">
        <header class="communication-panel-header">
          <div class="communication-panel-contact">
            <span class="chat-avatar chat-avatar--lg" id="active-chat-avatar" aria-hidden="true">—</span>
            <h1 class="communication-panel-name" id="active-chat-name">Select a chat</h1>
          </div>
          <div class="communication-panel-actions">
            <button type="button" class="btn-chat-call" id="btn-chat-call">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z" />
              </svg>
              Call
            </button>
            <button type="button" class="btn-chat-icon" aria-label="Search in conversation">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <circle cx="11" cy="11" r="7" />
                <line x1="16.5" y1="16.5" x2="21" y2="21" />
              </svg>
            </button>
            <button type="button" class="btn-chat-icon" aria-label="More options">
              <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <circle cx="12" cy="5" r="1.5" />
                <circle cx="12" cy="12" r="1.5" />
                <circle cx="12" cy="19" r="1.5" />
              </svg>
            </button>
          </div>
        </header>

        <div class="communication-messages" id="chat-messages" role="log" aria-live="polite"></div>

        <form class="communication-compose" id="chat-compose-form">
          <button type="button" class="btn-chat-compose-icon" aria-label="Add attachment">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <line x1="12" y1="5" x2="12" y2="19" />
              <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
          </button>
          <input
            type="text"
            class="communication-compose-input"
            id="chat-compose-input"
            placeholder="Type a message"
            autocomplete="off"
          />
          <button type="button" class="btn-chat-compose-icon" aria-label="Voice message">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
              <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
              <line x1="12" y1="19" x2="12" y2="23" />
              <line x1="8" y1="23" x2="16" y2="23" />
            </svg>
          </button>
        </form>
      </section>
    </div>
  </main>

  <script type="module" src="../js/communication.js"></script>
</body>
</html>
