<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logs — Aura Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body class="staff-app">
  <header class="staff-nav">
    <a class="staff-nav-brand" href="dashboard.html">
      <img class="logo" src="../assets/images/logo.png" alt="" width="40" height="40" />
      <span class="staff-nav-brand-text">Aura Guide</span>
    </a>
    <div class="staff-nav-links-wrap">
      <button type="button" class="staff-nav-scroll-btn staff-nav-scroll-btn--prev" aria-label="Scroll navigation left">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <nav class="staff-nav-links" aria-label="Main">
        <a class="staff-nav-link" href="dashboard.html">Dashboard</a>
        <a class="staff-nav-link" href="appointments.html">Appointments</a>
        <a class="staff-nav-link" href="patients.html">Patients</a>
        <a class="staff-nav-link" href="emergencies.html">Emergencies</a>
        <a class="staff-nav-link" href="reports.html">Reports</a>
        <a class="staff-nav-link" href="communication.html">Communication</a>
        <a class="staff-nav-link is-active" href="logs.html">Logs</a>
      </nav>
      <button type="button" class="staff-nav-scroll-btn staff-nav-scroll-btn--next" aria-label="Scroll navigation right">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
    <div class="staff-nav-user">
      <button type="button" class="staff-avatar" id="btn-user-menu" aria-label="Account menu">
        <span class="staff-avatar-initials" id="staff-avatar-initials">—</span>
      </button>
      <div class="staff-user-menu" id="user-menu" hidden>
        <p class="staff-user-menu-name" id="menu-staff-name">—</p>
        <p class="staff-user-menu-role" id="menu-staff-role">—</p>
        <button type="button" class="staff-user-menu-signout" id="btn-sign-out">Sign out</button>
      </div>
    </div>
  </header>

  <main class="staff-page logs-page">
    <header class="page-toolbar logs-toolbar-top">
      <div class="page-toolbar-heading">
        <h1 class="page-title">System Activity Logs</h1>
        <p class="page-subtitle">Audit trail for all user actions and system events.</p>
      </div>
      <button type="button" class="logs-export-btn" id="logs-export-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M12 3v12" />
          <path d="M8 11l4 4 4-4" />
          <path d="M5 21h14" />
        </svg>
        Export Logs
      </button>
    </header>

    <div class="appointments-toolbar logs-toolbar-filters">
      <label class="search-field">
        <span class="search-field-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="7" />
            <line x1="16.5" y1="16.5" x2="21" y2="21" />
          </svg>
        </span>
        <input
          type="search"
          class="search-field-input"
          id="logs-search"
          placeholder="Search by user, action, or ID..."
          autocomplete="off"
        />
      </label>
      <label class="logs-date-range-field">
        <span class="logs-date-range-label">Date range</span>
        <select class="logs-date-range-select" id="logs-date-range" aria-label="Filter logs by date range">
          <option value="7">Past 7 days</option>
          <option value="30" selected>Past 30 days</option>
          <option value="60">Past 60 days</option>
          <option value="all">All time</option>
        </select>
      </label>
      <div class="filter-tabs logs-filter-tabs" role="tablist" aria-label="Filter logs by type">
        <button type="button" class="filter-tab is-active" data-type="all">All</button>
        <button type="button" class="filter-tab" data-type="info">Info</button>
        <button type="button" class="filter-tab" data-type="warning">Warning</button>
        <button type="button" class="filter-tab" data-type="security">Security</button>
      </div>
    </div>

    <div class="table-card">
      <table class="data-table logs-table">
        <thead>
          <tr>
            <th scope="col">Timestamp</th>
            <th scope="col">User</th>
            <th scope="col">Action</th>
            <th scope="col">Details</th>
            <th scope="col">Type</th>
            <th scope="col">IP Address</th>
          </tr>
        </thead>
        <tbody id="logs-tbody"></tbody>
      </table>
      <p class="table-empty" id="logs-loading">Loading activity logs…</p>
      <p class="table-empty" id="logs-empty" hidden>No logs match your filters.</p>
    </div>
  </main>

  <script type="module" src="../js/logs.js"></script>
</body>
</html>
