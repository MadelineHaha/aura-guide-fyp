<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rehabilitation Plans — Aura Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body class="staff-app">
  <header class="staff-nav">
    <a class="staff-nav-brand" href="dashboard.html">
      <img class="logo" src="../assets/images/logo.png" alt="" width="40" height="40" />
      <span class="staff-nav-brand-text">Aura Guide</span>
    </a>
    <div class="staff-nav-links-wrap">
      <button type="button" class="staff-nav-scroll-btn staff-nav-scroll-btn--prev" aria-label="Scroll navigation left">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <nav class="staff-nav-links" aria-label="Main">
        <!-- Dynamically injected by staff-shell.js -->
      </nav>
      <button type="button" class="staff-nav-scroll-btn staff-nav-scroll-btn--next" aria-label="Scroll navigation right">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
    <div class="staff-nav-user">
      <button type="button" class="staff-avatar" id="btn-user-menu" aria-label="Account menu">
        <span class="staff-avatar-initials" id="staff-avatar-initials">—</span>
      </button>
      <div class="staff-user-menu" id="user-menu" hidden>
        <p class="staff-user-menu-name" id="menu-staff-name">—</p>
        <p class="staff-user-menu-role" id="menu-staff-role">—</p>
        <button type="button" class="staff-user-menu-signout" id="btn-sign-out">Sign out</button>
      </div>
    </div>
  </header>

  <main class="staff-page">
    <header class="page-toolbar">
      <div class="page-toolbar-heading">
        <h1 class="page-title">Rehabilitation Plans</h1>
        <p class="page-subtitle" id="rehab-plans-count">Loading patients...</p>
      </div>
      <div class="page-toolbar-actions">
        <!-- Add Plan button hidden by default -->
        <button type="button" class="btn-primary btn-quick-action" id="btn-create-plan" hidden>
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          Create Plan
        </button>
      </div>
    </header>

    <div class="patient-accordion-list" id="rehab-plans-accordion-list">
      <!-- Dynamically populated -->
    </div>
    <p class="table-empty" id="rehab-plans-empty" hidden>No patients found.</p>

    <div class="modal-backdrop modal-backdrop--stacked" id="create-plan-modal" hidden>
      <div
        class="add-health-record-modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="create-plan-title"
      >
        <header class="health-records-header">
          <div class="health-records-header-main">
            <span class="health-records-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6" />
              </svg>
            </span>
            <div>
              <h2 class="health-records-title" id="create-plan-title">Create Rehabilitation Plan</h2>
            </div>
          </div>
          <button type="button" class="health-records-close" id="create-plan-close" aria-label="Close">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </header>

        <form class="add-health-record-form" id="create-plan-form" novalidate>
          <div class="add-health-record-body">
            <label class="form-field form-field--full">
              <span class="form-field-label">Select Patient</span>
              <select class="form-field-input form-field-select" id="create-plan-patient-select" required>
                <option value="">Choose a patient...</option>
                <!-- Populated dynamically -->
              </select>
            </label>
            <label class="form-field">
              <span class="form-field-label">Start Date</span>
              <input class="form-field-input" type="date" id="create-plan-start" required />
            </label>
            <label class="form-field">
              <span class="form-field-label">Number of Weeks</span>
              <input
                class="form-field-input"
                type="number"
                id="create-plan-weeks"
                min="1"
                max="12"
                value="4"
                required
              />
            </label>
            
            <div class="form-field form-field--full">
              <span class="form-field-label">Weekly Milestones</span>
              <div id="create-plan-milestones">
                <!-- Dynamically generated week inputs -->
              </div>
            </div>
            <label class="form-field form-field--full">
              <span class="form-field-label">Plan Notes</span>
              <textarea
                class="form-field-input form-field-textarea"
                id="create-plan-notes"
                rows="2"
                placeholder="Overall goals for this rehabilitation plan"
              ></textarea>
            </label>
          </div>
          <p class="add-patient-error" id="create-plan-error" role="alert" hidden></p>
          <footer class="add-health-record-footer">
            <button type="submit" class="btn-primary btn-save-health-record" id="create-plan-submit">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
                <polyline points="20 6 9 17 4 12" />
              </svg>
              <span>Create Plan</span>
            </button>
          </footer>
        </form>
      </div>
    </div>
  </main>

  <script type="module" src="../js/rehab-plans-page.js?v=3"></script>
</body>
</html>
