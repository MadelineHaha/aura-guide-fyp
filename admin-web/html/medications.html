<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Medication Management — Aura Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body class="staff-app">
  <header class="staff-nav">
    <a class="staff-nav-brand" href="dashboard.html">
      <img class="logo" src="../assets/images/logo.png" alt="" width="40" height="40" />
      <span class="staff-nav-brand-text">Aura Guide</span>
    </a>
    <div class="staff-nav-links-wrap">
      <button type="button" class="staff-nav-scroll-btn staff-nav-scroll-btn--prev" aria-label="Scroll navigation left">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <nav class="staff-nav-links" aria-label="Main">
        <!-- Dynamically injected by staff-shell.js -->
      </nav>
      <button type="button" class="staff-nav-scroll-btn staff-nav-scroll-btn--next" aria-label="Scroll navigation right">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
    <div class="staff-nav-user">
      <button type="button" class="staff-avatar" id="btn-user-menu" aria-label="Account menu">
        <span class="staff-avatar-initials" id="staff-avatar-initials">—</span>
      </button>
      <div class="staff-user-menu" id="user-menu" hidden>
        <p class="staff-user-menu-name" id="menu-staff-name">—</p>
        <p class="staff-user-menu-role" id="menu-staff-role">—</p>
        <button type="button" class="staff-user-menu-signout" id="btn-sign-out">Sign out</button>
      </div>
    </div>
  </header>

  <main class="staff-page">
    <header class="page-toolbar">
      <div class="page-toolbar-heading">
        <h1 class="page-title">Medication Management</h1>
        <p class="page-subtitle" id="medications-count">Loading patients...</p>
      </div>
      <div class="page-toolbar-actions">
        <button type="button" class="btn-primary btn-quick-action" id="btn-add-medication" hidden>
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          Prescribe Medication
        </button>
      </div>
    </header>

    <div class="patient-accordion-list" id="medications-accordion-list">
      <!-- Dynamically populated -->
    </div>
    <p class="table-empty" id="medications-empty" hidden>No patients found in Firestore.</p>

    <div class="modal-backdrop modal-backdrop--stacked" id="add-medication-modal" hidden>
      <div
        class="add-health-record-modal add-medication-modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="add-medication-title"
      >
        <header class="health-records-header">
          <div class="health-records-header-main">
            <span class="health-records-icon medications-modal-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M10.5 20.5l10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7z" />
                <line x1="8.5" y1="8.5" x2="15.5" y2="15.5" />
              </svg>
            </span>
            <div>
              <h2 class="health-records-title" id="add-medication-title">Prescribe Medication</h2>
            </div>
          </div>
          <button type="button" class="health-records-close" id="add-medication-close" aria-label="Close">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </header>

        <form class="add-health-record-form" id="add-medication-form" novalidate>
          <div class="add-health-record-body">
            <label class="form-field form-field--full">
              <span class="form-field-label">Select Patient</span>
              <select class="form-field-input form-field-select" id="add-medication-patient-select" required>
                <option value="">Choose a patient...</option>
                <!-- Populated dynamically -->
              </select>
            </label>
            <label class="form-field form-field--full">
              <span class="form-field-label">Medication Name</span>
              <input
                class="form-field-input"
                type="text"
                id="add-medication-name"
                placeholder="e.g. Vitamin D 1000IU"
                required
              />
            </label>
            <label class="form-field">
              <span class="form-field-label">Dosage</span>
              <input
                class="form-field-input"
                type="text"
                id="add-medication-dosage"
                placeholder="e.g. 1 capsule"
                required
              />
            </label>
            <label class="form-field">
              <span class="form-field-label">Frequency</span>
              <select class="form-field-input form-field-select" id="add-medication-frequency" required>
                <option value="">Select frequency</option>
                <option value="Once daily">Once daily</option>
                <option value="Twice daily">Twice daily</option>
                <option value="Three times daily">Three times daily</option>
                <option value="Weekly">Weekly</option>
              </select>
            </label>
            <label class="form-field form-field--full">
              <span class="form-field-label">Instructions</span>
              <textarea
                class="form-field-input form-field-textarea"
                id="add-medication-instructions"
                rows="2"
                placeholder="How the patient should take it"
                required
              ></textarea>
            </label>
            <label class="form-field">
              <span class="form-field-label">Start Date</span>
              <input class="form-field-input" type="date" id="add-medication-start" required />
            </label>
            <label class="form-field">
              <span class="form-field-label">End Date</span>
              <input class="form-field-input" type="date" id="add-medication-end" required />
              <span class="form-field-hint">Cannot be before today or the start date.</span>
            </label>
            <div class="form-field form-field--full complete-med-reminder-times-field">
              <span class="form-field-label" id="add-medication-reminder-times-label">Reminder time</span>
              <div class="complete-med-reminder-times" id="add-medication-reminder-times"></div>
            </div>
          </div>
          <p class="add-patient-error" id="add-medication-error" role="alert" hidden></p>
          <footer class="add-health-record-footer add-medication-footer">
            <button type="submit" class="btn-primary btn-save-health-record" id="add-medication-submit">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
                <polyline points="20 6 9 17 4 12" />
              </svg>
              <span id="add-medication-save-label">Save Medication</span>
            </button>
          </footer>
        </form>
      </div>
    </div>
  </main>

  <script type="module" src="../js/medications-page.js"></script>
</body>
</html>
