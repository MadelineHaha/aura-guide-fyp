<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Appointments — Aura Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/main.css" />
</head>
<body class="staff-app">
  <header class="staff-nav">
    <a class="staff-nav-brand" href="dashboard.html">
      <img class="logo" src="../assets/images/logo.png" alt="" width="40" height="40" />
      <span class="staff-nav-brand-text">Aura Guide</span>
    </a>
    <nav class="staff-nav-links" aria-label="Main">
      <a class="staff-nav-link" href="dashboard.html">Dashboard</a>
      <a class="staff-nav-link is-active" href="appointments.html">Appointments</a>
      <a class="staff-nav-link" href="patients.html">Patients</a>
      <a class="staff-nav-link" href="#">Emergencies</a>
      <a class="staff-nav-link" href="#">Reports</a>
    </nav>
    <div class="staff-nav-user">
      <button type="button" class="staff-avatar" id="btn-user-menu" aria-label="Account menu">
        <span class="staff-avatar-initials" id="staff-avatar-initials">—</span>
      </button>
      <div class="staff-user-menu" id="user-menu" hidden>
        <p class="staff-user-menu-name" id="menu-staff-name">—</p>
        <p class="staff-user-menu-role" id="menu-staff-role">—</p>
        <button type="button" class="staff-user-menu-signout" id="btn-sign-out">Sign out</button>
      </div>
    </div>
  </header>

  <main class="staff-page appointments-page">
    <header class="page-toolbar">
      <div class="page-toolbar-heading">
        <h1 class="page-title">Appointments</h1>
        <p class="page-subtitle" id="appointments-count">6 appointments</p>
      </div>
      <button type="button" class="btn-primary" id="btn-add-appointment">+ Add Appointment</button>
    </header>

    <div class="appointments-toolbar">
      <label class="search-field">
        <span class="search-field-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="7" />
            <line x1="16.5" y1="16.5" x2="21" y2="21" />
          </svg>
        </span>
        <input
          type="search"
          class="search-field-input"
          id="appointment-search"
          placeholder="Search patient or doctor..."
          autocomplete="off"
        />
      </label>
      <div class="filter-tabs" role="tablist" aria-label="Filter by status">
        <button type="button" class="filter-tab is-active" data-status="all">All</button>
        <button type="button" class="filter-tab" data-status="scheduled">Scheduled</button>
        <button type="button" class="filter-tab" data-status="rescheduled">Rescheduled</button>
        <button type="button" class="filter-tab" data-status="cancelled">Cancelled</button>
      </div>
    </div>

    <div class="table-card">
      <table class="data-table">
        <thead>
          <tr>
            <th scope="col">Patient</th>
            <th scope="col">Date &amp; Time</th>
            <th scope="col">Appointment Type</th>
            <th scope="col">Location</th>
            <th scope="col">Staff</th>
            <th scope="col">Status</th>
            <th scope="col">Actions</th>
          </tr>
        </thead>
        <tbody id="appointments-tbody"></tbody>
      </table>
      <p class="table-empty" id="appointments-empty" hidden>No appointments match your search.</p>
      <nav class="table-pagination" id="appointments-pagination" aria-label="Appointments pages"></nav>
    </div>
  </main>

  <div class="modal-backdrop" id="add-appointment-modal" hidden>
    <div
      class="add-patient-modal"
      role="dialog"
      aria-modal="true"
      aria-labelledby="add-appointment-title"
    >
      <header class="modal-dialog-header">
        <div class="modal-dialog-header-main">
          <span class="modal-dialog-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="4" width="18" height="18" rx="2" />
              <line x1="16" y1="2" x2="16" y2="6" />
              <line x1="8" y1="2" x2="8" y2="6" />
              <line x1="3" y1="10" x2="21" y2="10" />
            </svg>
          </span>
          <h2 class="modal-dialog-title" id="add-appointment-title">Add Appointment</h2>
        </div>
        <button type="button" class="modal-dialog-close" id="add-appointment-close" aria-label="Close">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="18" y1="6" x2="6" y2="18" />
            <line x1="6" y1="6" x2="18" y2="18" />
          </svg>
        </button>
      </header>

      <form class="add-patient-form" id="add-appointment-form" novalidate>
        <div class="add-patient-grid">
          <label class="form-field">
            <span class="form-field-label">Patient (User ID)</span>
            <select class="form-field-input form-field-select" id="add-appointment-patient" required>
              <option value="">Select patient</option>
            </select>
          </label>
          <label class="form-field">
            <span class="form-field-label">Appointment Type</span>
            <select class="form-field-input form-field-select" id="add-appointment-type" required>
              <option value="">Select type</option>
              <option value="Consultation">Consultation</option>
              <option value="Follow-up">Follow-up</option>
              <option value="Therapy Session">Therapy Session</option>
              <option value="Emergency">Emergency</option>
            </select>
          </label>
          <label class="form-field">
            <span class="form-field-label">Location</span>
            <input class="form-field-input" type="text" id="add-appointment-location" placeholder="Room, clinic, or meeting link" required />
          </label>
          <label class="form-field">
            <span class="form-field-label">Date</span>
            <input class="form-field-input" type="date" id="add-appointment-date" required />
          </label>
          <label class="form-field">
            <span class="form-field-label">Time</span>
            <input class="form-field-input" type="time" id="add-appointment-time" required />
          </label>
          <label class="form-field form-field--full">
            <span class="form-field-label">Notes</span>
            <textarea class="form-field-input form-field-textarea" id="add-appointment-notes" rows="3" placeholder="Additional notes (optional)"></textarea>
          </label>
        </div>
        <p class="add-patient-error" id="add-appointment-error" role="alert" hidden></p>
        <footer class="add-patient-footer">
          <button type="submit" class="btn-primary btn-add-profile">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
              <line x1="12" y1="5" x2="12" y2="19" />
              <line x1="5" y1="12" x2="19" y2="12" />
            </svg>
            Add Appointment
          </button>
        </footer>
      </form>
    </div>
  </div>

  <script type="module" src="../js/appointments.js"></script>
</body>
</html>
